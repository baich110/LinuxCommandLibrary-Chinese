name: Build APKs

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          
      - name: Download Gradle
        run: |
          cd gradle/wrapper
          curl -sL -o gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.4.1/gradle/wrapper/gradle-wrapper.jar
          cd ../..
          chmod +x gradlew
          
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/build/outputs/apk/debug/android-debug.apk
